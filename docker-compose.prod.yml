# ============================================================
# Encontralo · PRODUCCIÓN (VPS Hostinger + Traefik)
# Sin puertos publicados: Traefik enruta por dominio vía labels.
# DB = Supabase Cloud (el VPS no corre Postgres).
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# DOMINIO: DOMAIN = dominio canónico (ej. encontralo.store).
#   DOMAIN_ALT (opcional) = segundo dominio servido en simultáneo durante la
#   migración (ej. buscadonde.com). Si no se setea, cae a DOMAIN (sin efecto).
# ============================================================
services:
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* se hornean en el bundle (apuntan a Supabase Cloud + api público)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        # "1" = sitio en modo captura: solo /bermejo y /admin; el resto muestra "Próximamente".
        # Para abrir el sitio público: poné "0" y reconstruí el frontend.
        NEXT_PUBLIC_MODO_CAPTURA: ${MODO_CAPTURA:-1}
    container_name: buscadonde-frontend
    restart: unless-stopped
    networks: [traefik, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.buscadonde-fe.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`) || Host(`${DOMAIN_ALT:-${DOMAIN}}`) || Host(`www.${DOMAIN_ALT:-${DOMAIN}}`)"
      - traefik.http.routers.buscadonde-fe.entrypoints=websecure
      - traefik.http.routers.buscadonde-fe.tls=true
      - traefik.http.routers.buscadonde-fe.tls.certresolver=letsencrypt
      - traefik.http.services.buscadonde-fe.loadbalancer.server.port=3003

  backend:
    build: ./backend
    container_name: buscadonde-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - whisper_models:/models      # cache del modelo de transcripción (persiste entre rebuilds)
    networks: [traefik, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.buscadonde-be.rule=Host(`api.${DOMAIN}`) || Host(`api.${DOMAIN_ALT:-${DOMAIN}}`)"
      - traefik.http.routers.buscadonde-be.entrypoints=websecure
      - traefik.http.routers.buscadonde-be.tls=true
      - traefik.http.routers.buscadonde-be.tls.certresolver=letsencrypt
      - traefik.http.services.buscadonde-be.loadbalancer.server.port=8000

volumes:
  whisper_models:

networks:
  traefik:
    external: true
  internal:
