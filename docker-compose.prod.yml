# ============================================================
# Encontralo · PRODUCCIÓN (VPS Hostinger + Traefik)
# Sin puertos publicados: Traefik enruta por dominio vía labels.
# DB = Postgres + PostgREST self-hosted, EN ESTE MISMO VPS (ver selfhost/).
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# DOMINIO: DOMAIN = dominio canónico (ej. encontralo.store).
#   DOMAIN_ALT (opcional) = segundo dominio servido en simultáneo durante la
#   migración (ej. buscadonde.com). Si no se setea, cae a DOMAIN (sin efecto).
# ============================================================
services:
  postgres:
    image: postgres:17-alpine
    container_name: buscadonde-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTHENTICATOR_PASSWORD=${AUTHENTICATOR_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./selfhost/postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: buscadonde-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGRST_DB_URI=postgres://authenticator:${AUTHENTICATOR_PASSWORD}@postgres:5432/postgres
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${PGRST_JWT_SECRET}
      - PGRST_DB_MAX_ROWS=1000
    networks: [traefik, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.buscadonde-db.rule=Host(`db.${DOMAIN}`)"
      - traefik.http.routers.buscadonde-db.entrypoints=websecure
      - traefik.http.routers.buscadonde-db.tls=true
      - traefik.http.routers.buscadonde-db.tls.certresolver=letsencrypt
      - traefik.http.services.buscadonde-db.loadbalancer.server.port=3000
      # supabase-js/supabase-py agregan /rest/v1 solos (asumen el Kong de
      # Supabase Cloud) — PostgREST bare sirve las tablas en la raíz, así
      # que se lo sacamos acá antes de reenviar.
      - traefik.http.routers.buscadonde-db.middlewares=buscadonde-db-stripprefix
      - "traefik.http.middlewares.buscadonde-db-stripprefix.stripprefix.prefixes=/rest/v1"
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* se hornean en el bundle (apuntan a PostgREST self-hosted, https://db.$DOMAIN)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
        # "1" = sitio en modo captura: solo /bermejo y /admin; el resto muestra "Próximamente".
        # Para abrir el sitio público: poné "0" y reconstruí el frontend.
        NEXT_PUBLIC_MODO_CAPTURA: ${MODO_CAPTURA:-1}
    container_name: buscadonde-frontend
    restart: unless-stopped
    depends_on:
      postgrest:
        condition: service_started
    networks: [traefik, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.buscadonde-fe.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`) || Host(`${DOMAIN_ALT:-${DOMAIN}}`) || Host(`www.${DOMAIN_ALT:-${DOMAIN}}`)"
      - traefik.http.routers.buscadonde-fe.entrypoints=websecure
      - traefik.http.routers.buscadonde-fe.tls=true
      - traefik.http.routers.buscadonde-fe.tls.certresolver=letsencrypt
      - traefik.http.services.buscadonde-fe.loadbalancer.server.port=3003

  backend:
    build: ./backend
    container_name: buscadonde-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      postgrest:
        condition: service_started
    environment:
      # supabase-py agrega /rest/v1 solo (asume el Kong de Supabase Cloud) —
      # por eso va por la URL pública con el stripprefix de Traefik, en vez
      # de pegarle directo a postgrest:3000 (que no tiene ese prefijo).
      - SUPABASE_URL=https://db.${DOMAIN}
      - FOTOS_PUBLIC_BASE_URL=https://api.${DOMAIN}/fotos
    volumes:
      - whisper_models:/models      # cache del modelo de transcripción (persiste entre rebuilds)
      - comercio_fotos:/data/fotos  # fotos de comercio (reemplaza a Supabase Storage)
    networks: [traefik, internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - "traefik.http.routers.buscadonde-be.rule=Host(`api.${DOMAIN}`) || Host(`api.${DOMAIN_ALT:-${DOMAIN}}`)"
      - traefik.http.routers.buscadonde-be.entrypoints=websecure
      - traefik.http.routers.buscadonde-be.tls=true
      - traefik.http.routers.buscadonde-be.tls.certresolver=letsencrypt
      - traefik.http.services.buscadonde-be.loadbalancer.server.port=8000

volumes:
  whisper_models:
  postgres_data:
  comercio_fotos:

networks:
  traefik:
    external: true
  internal:
